# Example: Retail Analytics Multi-Agent
# Copy to agents.yaml and update with your workspace resources

orchestrator:
  name: "Retail Analytics Assistant"
  model: "databricks-claude-sonnet-4-5"
  instructions: |
    You are a retail analytics assistant for merchandising and operations teams.
    Help users explore sales data, inventory, product information, and forecasts.
    Always provide data-backed answers with source citations.

subagents:
  - name: sales_data
    type: genie
    space_id: "${GENIE_SPACE_ID}"
    description: >
      Query structured retail data: sales transactions, store performance,
      product catalog, inventory levels, customer segments, and promotions.
      Use for sales reports, KPI lookups, trend analysis, and store comparisons.

  - name: product_docs
    type: vector_search
    index_name: "${UC_CATALOG}.${UC_SCHEMA}.product_docs_index"
    columns: ["content", "category", "source"]
    num_results: 5
    description: >
      Search product documentation, vendor guidelines, return policies,
      and merchandising playbooks.
      Use for product specs, policy questions, or operational procedures.

  - name: demand_forecast
    type: uc_function
    function: "${UC_CATALOG}.${UC_SCHEMA}.fn_demand_forecast"
    parameters:
      - name: product_id
        type: string
      - name: store_id
        type: string
      - name: days_ahead
        type: integer
    description: >
      Get demand forecast for a product at a specific store.
      Returns predicted units for the next N days.
      Use when asked about inventory planning or expected demand.

  - name: price_optimizer
    type: external_mcp
    url: "${PRICING_MCP_URL}"
    headers:
      Authorization: "Bearer ${PRICING_API_TOKEN}"
    description: >
      Query the pricing optimization engine for recommended pricing,
      markdown suggestions, and competitive price analysis.
      Use when asked about pricing strategy or markdown decisions.
